<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kommz Remote V4.9</title>
  <style>
    :root {
      --bg: #07090f;
      --surface: #121826;
      --surface-2: #0d1320;
      --border: #25304a;
      --primary: #6d28d9;
      --primary-2: #8b5cf6;
      --active: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #f4f7ff;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 14px;
      background: radial-gradient(1200px 400px at 50% -10%, #1e1b4b40, transparent), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      touch-action: manipulation;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 8px;
    }

    .brand {
      font-weight: 900;
      letter-spacing: -0.4px;
      font-size: 1.05rem;
    }

    .brand small {
      color: var(--primary-2);
      font-size: 0.8rem;
    }

    .header-right {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: #111827;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    .status-pill.online { color: #6ee7b7; border-color: #166534; background: #052e1b; }
    .status-pill.voice-on { color: #c4b5fd; border-color: #4c1d95; background: #1e1b4b; }
    .status-pill.voice-off { color: #fda4af; border-color: #7f1d1d; background: #2a1116; }
    .status-pill.warmup-ready { color: #93c5fd; border-color: #1d4ed8; background: #0b1c3f; }
    .status-pill.warmup-cold { color: #fcd34d; border-color: #92400e; background: #2a1a0b; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

    .card {
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .card-header {
      margin-bottom: 10px;
      font-size: 0.72rem;
      letter-spacing: 0.9px;
      font-weight: 800;
      color: #7c8aa8;
      text-transform: uppercase;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .btn {
      height: 60px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: #a6b2cc;
      cursor: pointer;
      font-weight: 800;
      font-size: 0.72rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 3px;
      transition: transform 0.08s, border-color 0.2s, background 0.2s, color 0.2s;
    }

    .btn .icon { font-size: 1.1rem; line-height: 1; }
    .btn:active { transform: scale(0.97); }
    .btn.active { background: #1b1533; border-color: var(--primary); color: #f5f3ff; box-shadow: 0 0 0 1px #6d28d940 inset; }
    .btn.active-green { background: #042d21; border-color: #047857; color: #d1fae5; }
    .btn.warn { background: #2a1a0b; border-color: #92400e; color: #fcd34d; }
    .btn.panic { background: #310f16; border-color: #7f1d1d; color: #fda4af; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .row-split {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .gender-btn {
      height: 44px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b1220;
      font-size: 1.3rem;
    }

    input[type=range] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 8px;
      background: #212b41;
      border-radius: 99px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #c4b5fd;
      background: #6d28d9;
      box-shadow: 0 0 12px rgba(109, 40, 217, 0.8);
      margin-top: -7px;
    }

    .range-row { display: flex; justify-content: space-between; color: #8fa0be; font-size: 0.7rem; margin-top: 6px; }

    .flag-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
    }

    .flag-btn {
      aspect-ratio: 1;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0a0f1a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 1.3rem;
      transition: transform 0.08s, border-color 0.2s, background 0.2s;
    }

    .flag-btn:active { transform: scale(0.95); }
    .flag-btn.selected { border-color: #7c3aed; background: #271447; box-shadow: 0 0 0 1px #7c3aed66 inset; }
    .flag-code {
      position: absolute;
      right: 2px;
      bottom: 2px;
      font-size: 0.52rem;
      font-weight: 900;
      color: #b6c1da;
      background: #020617cc;
      border-radius: 4px;
      padding: 1px 3px;
    }

    .quick-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .small-note {
      margin-top: 8px;
      color: #90a0bf;
      font-size: 0.68rem;
      line-height: 1.35;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      pointer-events: none;
      transition: all .18s ease;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172aee;
      color: #e2e8f0;
      font-size: .78rem;
      font-weight: 700;
      max-width: calc(100vw - 24px);
      text-align: center;
      z-index: 9999;
      backdrop-filter: blur(6px);
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.ok { border-color: #166534; color: #bbf7d0; background: #052e1bee; }
    #toast.warn { border-color: #92400e; color: #fde68a; background: #2a1a0bee; }
    #toast.err { border-color: #7f1d1d; color: #fecaca; background: #2a1116ee; }

    @media (max-width: 380px) {
      .flag-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">KOMMZ <small>Remote V4.9</small></div>
    <div class="header-right">
      <div class="status-pill voice-off" id="voicePill"><div class="dot"></div><span id="voiceText">VOICE OFF</span></div>
      <div class="status-pill warmup-cold" id="xttsPill"><div class="dot"></div><span id="xttsText">XTTS ?</span></div>
      <div class="status-pill" id="statusPill"><div class="dot"></div><span id="statusText">OFFLINE</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Contrôles live</div>
    <div class="control-grid">
      <button class="btn" id="btnMain" onclick="cmdToggle()"><div class="icon">🔌</div><div>MAIN</div></button>
      <button class="btn" id="btnMic" onclick="cmdListen()"><div class="icon">🎧</div><div>ÉCOUTE</div></button>
      <button class="btn" id="btnTurbo" onclick="cmdFeature('turbo')"><div class="icon">🚀</div><div>TURBO</div></button>
      <button class="btn" id="btnBypass" onclick="cmdBypass()"><div class="icon">⏭️</div><div>BYPASS F4</div></button>
    </div>
    <div class="quick-row">
      <button class="btn warn" id="btnWarmup" onclick="cmdWarmup()"><div class="icon">🔥</div><div>WARMUP VOICE</div></button>
      <button class="btn panic" id="btnPanic" onclick="cmdPanic()"><div class="icon">⚠️</div><div>PANIC RESET</div></button>
    </div>
    <div class="small-note">Le warmup est protégé par cooldown côté serveur + anti-spam côté télécommande.</div>
  </div>

  <div class="card">
    <div class="card-header">Europe & US</div>
    <div class="flag-grid">
      <button class="flag-btn" onclick="cmdLang('EN')" id="lang-EN">🇺🇸<div class="flag-code">EN</div></button>
      <button class="flag-btn" onclick="cmdLang('FR')" id="lang-FR">🇫🇷<div class="flag-code">FR</div></button>
      <button class="flag-btn" onclick="cmdLang('ES')" id="lang-ES">🇪🇸<div class="flag-code">ES</div></button>
      <button class="flag-btn" onclick="cmdLang('DE')" id="lang-DE">🇩🇪<div class="flag-code">DE</div></button>
      <button class="flag-btn" onclick="cmdLang('IT')" id="lang-IT">🇮🇹<div class="flag-code">IT</div></button>
      <button class="flag-btn" onclick="cmdLang('PT')" id="lang-PT">🇵🇹<div class="flag-code">PT</div></button>
      <button class="flag-btn" onclick="cmdLang('NL')" id="lang-NL">🇳🇱<div class="flag-code">NL</div></button>
      <button class="flag-btn" onclick="cmdLang('PL')" id="lang-PL">🇵🇱<div class="flag-code">PL</div></button>
      <button class="flag-btn" onclick="cmdLang('TR')" id="lang-TR">🇹🇷<div class="flag-code">TR</div></button>
      <button class="flag-btn" onclick="cmdLang('RU')" id="lang-RU">🇷🇺<div class="flag-code">RU</div></button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Asie & Monde</div>
    <div class="flag-grid">
      <button class="flag-btn" onclick="cmdLang('JP')" id="lang-JP">🇯🇵<div class="flag-code">JP</div></button>
      <button class="flag-btn" onclick="cmdLang('KO')" id="lang-KO">🇰🇷<div class="flag-code">KR</div></button>
      <button class="flag-btn" onclick="cmdLang('ZH')" id="lang-ZH">🇨🇳<div class="flag-code">CN</div></button>
      <button class="flag-btn" onclick="cmdLang('UA')" id="lang-UA">🇺🇦<div class="flag-code">UA</div></button>
      <button class="flag-btn" onclick="cmdLang('SV')" id="lang-SV">🇸🇪<div class="flag-code">SE</div></button>
      <button class="flag-btn" onclick="cmdLang('ID')" id="lang-ID">🇮🇩<div class="flag-code">ID</div></button>
      <button class="flag-btn" onclick="cmdLang('TH')" id="lang-TH">🇹🇭<div class="flag-code">TH</div></button>
      <button class="flag-btn" onclick="cmdLang('VN')" id="lang-VN">🇻🇳<div class="flag-code">VN</div></button>
      <button class="flag-btn" onclick="cmdLang('HI')" id="lang-HI">🇮🇳<div class="flag-code">HI</div></button>
      <button class="flag-btn" onclick="cmdLang('BR')" id="lang-BR">🇧🇷<div class="flag-code">BR</div></button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Système</div>
    <div class="row-split">
      <button class="gender-btn" id="btnGender" onclick="cmdGender()">👩</button>
      <input type="range" id="volSlider" min="0" max="1.5" step="0.1" oninput="cmdVol(this.value)" />
    </div>
    <div class="range-row"><span>Volume TTS</span><span id="volValue">1.0</span></div>
  </div>

  <div id="toast"></div>

  <script>
    const inflight = new Set();
    const cooldownUntil = Object.create(null);
    let currentGender = 'FEMALE';

    function nowMs() { return Date.now(); }

    function toast(msg, type = 'ok') {
      const t = document.getElementById('toast');
      t.className = type + ' show';
      t.textContent = msg;
      setTimeout(() => t.className = '', 1400);
    }

    function withCooldown(key, ms) {
      const n = nowMs();
      if ((cooldownUntil[key] || 0) > n) return false;
      cooldownUntil[key] = n + ms;
      return true;
    }

    async function postJson(url, data = {}, timeoutMs = 4200) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
          signal: ctrl.signal,
        });
        let payload = {};
        try { payload = await res.json(); } catch (_) {}
        return { ok: res.ok, status: res.status, data: payload };
      } finally {
        clearTimeout(timer);
      }
    }

    async function simpleFetch(url, timeoutMs = 4200) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(url, { signal: ctrl.signal });
        let payload = {};
        try { payload = await res.json(); } catch (_) {}
        return { ok: res.ok, status: res.status, data: payload };
      } finally {
        clearTimeout(timer);
      }
    }

    function lockBtn(id, locked) {
      const el = document.getElementById(id);
      if (el) el.disabled = !!locked;
    }

    async function guardedAction(key, btnId, fn) {
      if (inflight.has(key)) return;
      inflight.add(key);
      lockBtn(btnId, true);
      try {
        await fn();
      } catch (e) {
        toast('Action indisponible', 'err');
      } finally {
        inflight.delete(key);
        lockBtn(btnId, false);
      }
    }

    function cmdToggle() {
      if (!withCooldown('main', 450)) return;
      guardedAction('main', 'btnMain', async () => {
        const r = await postJson('/toggle', {});
        if (!r.ok) return toast('Main: erreur', 'err');
      });
    }

    function cmdFeature(feat) {
      const k = 'feat_' + feat;
      if (!withCooldown(k, 350)) return;
      guardedAction(k, feat === 'turbo' ? 'btnTurbo' : '', async () => {
        const r = await postJson('/config/toggle_feature', { feature: feat });
        if (!r.ok) toast('Feature indisponible', 'err');
      });
    }

    function cmdBypass() {
      if (!withCooldown('bypass', 350)) return;
      const curr = document.getElementById('btnBypass').classList.contains('active');
      guardedAction('bypass', 'btnBypass', async () => {
        const r = await postJson('/module/bypass/toggle', { toggle: !curr });
        if (!r.ok) return toast('Bypass indisponible', 'err');
      });
    }

    function cmdListen() {
      if (!withCooldown('listen', 450)) return;
      const curr = document.getElementById('btnMic').classList.contains('active');
      guardedAction('listen', 'btnMic', async () => {
        const r = await postJson('/audio/listen/toggle', { toggle: !curr });
        if (!r.ok) return toast('Écoute indisponible', 'err');
      });
    }

    function cmdLang(langCode) {
      if (!withCooldown('lang', 280)) return;
      document.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('selected'));
      const btn = document.getElementById('lang-' + langCode);
      if (btn) btn.classList.add('selected');
      postJson('/config/target', { lang: langCode }).then((r) => {
        if (!r.ok) toast('Langue: erreur', 'err');
      });
    }

    function cmdGender() {
      const next = currentGender === 'FEMALE' ? 'MALE' : 'FEMALE';
      currentGender = next;
      document.getElementById('btnGender').textContent = next === 'FEMALE' ? '👩' : '👨';
      postJson('/config/gender_update', { gender: next }).then((r) => {
        if (!r.ok) toast('Genre: erreur', 'err');
      });
    }

    function cmdVol(val) {
      const v = Number.parseFloat(val);
      if (!Number.isFinite(v)) return;
      document.getElementById('volValue').textContent = v.toFixed(1);
      simpleFetch('/api/set_volume?val=' + encodeURIComponent(v.toFixed(2))).catch(() => {});
    }

    function cmdPanic() {
      if (!withCooldown('panic', 3000)) {
        toast('Attends avant un nouveau PANIC', 'warn');
        return;
      }
      if (!confirm('Déclencher PANIC RESET ?')) return;
      guardedAction('panic', 'btnPanic', async () => {
        const r = await postJson('/panic', {});
        if (!r.ok) return toast('Panic: erreur', 'err');
        toast('Panic reset envoyé', 'warn');
      });
    }

    function cmdWarmup() {
      if (!withCooldown('warmup', 5000)) {
        toast('Warmup déjà lancé, patiente…', 'warn');
        return;
      }
      guardedAction('warmup', 'btnWarmup', async () => {
        const r = await postJson('/kommz/xtts/warmup', {});
        if (r.status === 429) {
          const retry = Number(r.data?.retry_after || 0);
          if (retry > 0) cooldownUntil['warmup'] = nowMs() + retry * 1000;
          return toast('Warmup en cooldown (' + retry + 's)', 'warn');
        }
        if (!r.ok) return toast('Warmup indisponible', 'err');
        const retry = Number(r.data?.retry_after || 0);
        if (retry > 0) cooldownUntil['warmup'] = nowMs() + retry * 1000;
        toast('Warmup envoyé', 'ok');
      });
    }

    function paintButton(id, active, green = false) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.toggle('active', !!active && !green);
      el.classList.toggle('active-green', !!active && green);
    }

    function syncUI(data) {
      document.getElementById('statusPill').classList.add('online');
      document.getElementById('statusText').textContent = 'ONLINE';

      paintButton('btnMain', !!data.is_active, true);
      paintButton('btnMic', !!data.is_listening);
      paintButton('btnTurbo', !!data.turbo_latency_active);
      paintButton('btnBypass', !!data.bypass_mode_active);

      const main = document.getElementById('btnMain');
      main.querySelector('.icon').textContent = data.is_active ? '⚡' : '🔌';
      main.lastElementChild.textContent = data.is_active ? 'MAIN ON' : 'MAIN OFF';

      if (data.gender) {
        currentGender = data.gender;
        document.getElementById('btnGender').textContent = data.gender === 'FEMALE' ? '👩' : '👨';
      }

      const lang = (data.target_lang || 'EN').toUpperCase();
      const targetId = 'lang-' + lang;
      const activeBtn = document.querySelector('.flag-btn.selected');
      if (!activeBtn || activeBtn.id !== targetId) {
        document.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('selected'));
        const b = document.getElementById(targetId);
        if (b) b.classList.add('selected');
      }

      const slider = document.getElementById('volSlider');
      if (document.activeElement !== slider) {
        const vol = Number(data.tts_volume ?? 1.0);
        slider.value = String(vol);
        document.getElementById('volValue').textContent = vol.toFixed(1);
      }

      const voicePill = document.getElementById('voicePill');
      const voiceText = document.getElementById('voiceText');
      const voiceOn = (data.voice_licensed === true || data.voice_active === true);
      voicePill.classList.toggle('voice-on', voiceOn);
      voicePill.classList.toggle('voice-off', !voiceOn);
      voiceText.textContent = voiceOn ? 'VOICE ON' : 'VOICE OFF';

      const xttsState = String(data.xtts_runtime_state || '').toLowerCase();
      const xttsPill = document.getElementById('xttsPill');
      const xttsText = document.getElementById('xttsText');
      const ready = ['ready', 'warm', 'active'].includes(xttsState);
      xttsPill.classList.toggle('warmup-ready', ready);
      xttsPill.classList.toggle('warmup-cold', !ready);
      xttsText.textContent = ready ? 'XTTS READY' : 'XTTS COLD';

      const retry = Number(data.xtts_warmup_retry_after || 0);
      const warmBtn = document.getElementById('btnWarmup');
      if (retry > 0) {
        warmBtn.disabled = true;
        warmBtn.lastElementChild.textContent = 'WARMUP (' + retry + 's)';
      } else {
        if (!inflight.has('warmup')) warmBtn.disabled = false;
        warmBtn.lastElementChild.textContent = 'WARMUP VOICE';
      }
    }

    function setOffline() {
      document.getElementById('statusPill').classList.remove('online');
      document.getElementById('statusText').textContent = 'OFFLINE';
      document.getElementById('xttsPill').classList.remove('warmup-ready');
      document.getElementById('xttsPill').classList.add('warmup-cold');
      document.getElementById('xttsText').textContent = 'XTTS ?';
    }

    async function heartbeat() {
      try {
        const r = await simpleFetch('/status', 3600);
        if (!r.ok || !r.data) return setOffline();
        syncUI(r.data);
      } catch {
        setOffline();
      }
    }

    heartbeat();
    setInterval(heartbeat, 900);
  </script>
</body>
</html>
