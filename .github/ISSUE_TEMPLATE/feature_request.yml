name: Feature request
description: Suggest an improvement or new feature for Kommz Gamer Community
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Clear feature requests are easier to review and prioritize.

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What problem are you trying to solve?
      placeholder: Describe the pain point or missing capability
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
      placeholder: Describe the feature or change you want
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: When or why would this be useful?
      placeholder: Real user scenario
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI
        - Audio
        - Runtime
        - Config
        - Docs
        - Community workflow
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Optional - what are you doing today instead?

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for existing issues first
          required: true
        - label: This request is scoped to the Community repository
          required: true
